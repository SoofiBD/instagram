<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Follow Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f0f2f7;
      --card:         #ffffff;
      --border:       #e4e7ef;
      --text:         #111827;
      --muted:        #6b7280;
      --accent-a:     #833ab4;
      --accent-b:     #e1306c;
      --accent-c:     #fd1d1d;
      --green:        #10b981;
      --red:          #ef4444;
      --radius-lg:    18px;
      --radius-md:    12px;
      --radius-sm:    8px;
      --shadow:       0 4px 28px rgba(0,0,0,0.07);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.25rem;
      user-select: none;
    }

    .logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b), var(--accent-c));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(131,58,180,0.35);
    }

    h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: var(--muted); font-size: 0.93rem; margin-top: 0.4rem; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 2rem;
      width: 100%; max-width: 780px;
    }

    .card + .card { margin-top: 1.25rem; }

    /* ── Upload grid ── */
    .upload-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem;
      margin-bottom: 1.4rem;
    }
    @media (max-width: 540px) { .upload-grid { grid-template-columns: 1fr; } }

    .upload-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 1.75rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover          { border-color: var(--accent-a); background: #faf5ff; }
    .upload-zone.drag-over      { border-color: var(--accent-a); background: #f3e8ff; }
    .upload-zone.has-file       { border-color: var(--green);    background: #f0fdf4; border-style: solid; }
    .upload-zone.has-file .upload-icon { filter: none; }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .upload-icon  { font-size: 2rem; margin-bottom: 0.45rem; display: block; }
    .upload-label { font-weight: 700; font-size: 0.95rem; }
    .upload-hint  { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
    .upload-hint code {
      background: #f3f4f6; padding: 1px 5px; border-radius: 4px;
      font-size: 0.76rem; color: var(--text);
    }
    .file-name {
      font-size: 0.78rem; color: var(--green); margin-top: 0.5rem;
      font-weight: 600; word-break: break-all; min-height: 1.1em;
    }

    /* ── Button ── */
    .btn-analyze {
      width: 100%; padding: 0.88rem 1.5rem;
      border: none; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.015em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(131,58,180,0.3);
    }
    .btn-analyze:hover:not(:disabled) {
      opacity: 0.93; transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(131,58,180,0.4);
    }
    .btn-analyze:active:not(:disabled) { transform: translateY(0); }
    .btn-analyze:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ── Error ── */
    .error-msg {
      background: #fef2f2; border: 1.5px solid #fecaca;
      color: var(--red); border-radius: var(--radius-sm);
      padding: 0.72rem 1rem; font-size: 0.87rem; margin-top: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Results ── */
    .results-card { display: none; }
    .results-card.visible { display: block; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
      margin-bottom: 1.75rem;
    }
    @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } }

    .stat-box {
      background: var(--bg); border-radius: var(--radius-md);
      padding: 1.1rem 0.75rem; text-align: center;
    }
    .stat-num   { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.04em; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem;
                  text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

    .stat-box.accent .stat-num {
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* List controls */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.85rem; gap: 0.5rem; flex-wrap: wrap;
    }
    .list-title { font-weight: 700; font-size: 0.97rem; }

    .actions { display: flex; gap: 0.5rem; }

    .btn-sm {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.42rem 0.85rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--card); color: var(--text); font-size: 0.8rem;
      font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .btn-sm:hover    { border-color: var(--accent-a); color: var(--accent-a); }
    .btn-sm.success  { border-color: var(--green); color: var(--green); }

    .search-wrap { position: relative; margin-bottom: 0.85rem; }
    .search-wrap svg {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 0.62rem 0.9rem 0.62rem 2.35rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.88rem; outline: none;
      transition: border-color 0.2s;
      color: var(--text); background: var(--card);
    }
    .search-input:focus { border-color: var(--accent-a); }
    .search-input::placeholder { color: var(--muted); }

    /* User list */
    .user-list {
      list-style: none;
      max-height: 460px; overflow-y: auto;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
    }
    .user-list::-webkit-scrollbar { width: 5px; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .user-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
      transition: background 0.12s; gap: 0.75rem;
    }
    .user-item:last-child { border-bottom: none; }
    .user-item:hover { background: #fafbff; }

    .user-left { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }

    .avatar {
      width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 0.82rem;
    }

    .user-row { min-width: 0; }
    .user-name {
      font-weight: 600; font-size: 0.88rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-index { font-size: 0.72rem; color: var(--muted); }

    .profile-link {
      font-size: 0.77rem; color: var(--accent-a); font-weight: 600;
      text-decoration: none; padding: 0.3rem 0.7rem;
      border: 1.5px solid #e9d5ff; border-radius: 6px;
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .profile-link:hover { background: #f3e8ff; border-color: var(--accent-a); }

    /* Empty state */
    .empty-state {
      padding: 3.5rem 1.5rem; text-align: center; color: var(--muted);
    }
    .empty-state .es-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state .es-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
    .empty-state .es-body  { font-size: 0.85rem; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📸</div>
  <h1>Follow Analyzer</h1>
  <p class="subtitle">Upload your Instagram data exports and find who isn't following you back.</p>
</header>

<!-- Upload card -->
<div class="card">
  <div class="upload-grid">

    <div class="upload-zone" id="zone-followers">
      <input type="file" id="input-followers" accept=".json" multiple aria-label="Upload followers JSON files" />
      <span class="upload-icon">👥</span>
      <div class="upload-label">Followers</div>
      <div class="upload-hint">Drop or click · <code>followers_1.json</code>, <code>followers_2.json</code>…</div>
      <div class="file-name" id="fname-followers"></div>
    </div>

    <div class="upload-zone" id="zone-following">
      <input type="file" id="input-following" accept=".json" multiple aria-label="Upload following JSON files" />
      <span class="upload-icon">➡️</span>
      <div class="upload-label">Following</div>
      <div class="upload-hint">Drop or click · <code>following.json</code> (or multiple)</div>
      <div class="file-name" id="fname-following"></div>
    </div>

  </div>

  <button class="btn-analyze" id="btn-analyze" onclick="analyze()">Analyze</button>
  <div class="error-msg" id="error-msg" role="alert"></div>
</div>

<!-- Results card -->
<div class="card results-card" id="results-card">

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="s-followers">—</div>
      <div class="stat-label">Followers</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="s-following">—</div>
      <div class="stat-label">Following</div>
    </div>
    <div class="stat-box accent">
      <div class="stat-num" id="s-ghost">—</div>
      <div class="stat-label">Not Following Back</div>
    </div>
  </div>

  <div class="list-header">
    <div class="list-title">Users not following you back</div>
    <div class="actions">
      <button class="btn-sm" id="btn-copy" onclick="copyList()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy List
      </button>
      <button class="btn-sm" id="btn-csv" onclick="downloadCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      type="search" id="search-input"
      class="search-input" placeholder="Search username…"
      oninput="filterList(this.value)"
      aria-label="Search users"
    />
  </div>

  <ul class="user-list" id="user-list" aria-label="Users not following back"></ul>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let notFollowingBack = [];      // full sorted list
let currentView     = [];       // filtered subset

// ─── Upload zones: hover + drag-and-drop (supports multiple files) ───────────
function initZone(inputId, zoneId, fnameId) {
  const input = document.getElementById(inputId);
  const zone  = document.getElementById(zoneId);
  const fname = document.getElementById(fnameId);

  function markFiles(files) {
    if (!files || files.length === 0) return;
    if (files.length === 1) {
      fname.textContent = '✓ ' + files[0].name;
    } else {
      fname.textContent = '✓ ' + files.length + ' dosya seçildi';
    }
    zone.classList.add('has-file');
  }

  input.addEventListener('change', () => markFiles(input.files));

  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()  => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const droppedFiles = e.dataTransfer.files;
    if (droppedFiles.length > 0) {
      const dt = new DataTransfer();
      // Merge with existing files
      for (const f of input.files) dt.items.add(f);
      for (const f of droppedFiles) {
        if (f.name.toLowerCase().endsWith('.json')) dt.items.add(f);
      }
      input.files = dt.files;
      markFiles(input.files);
    }
  });
}

initZone('input-followers', 'zone-followers', 'fname-followers');
initZone('input-following', 'zone-following', 'fname-following');

// ─── JSON parser: handles all known Instagram export shapes ──────────────────
function extractUsernameFromHref(href) {
  if (!href || typeof href !== 'string') return null;
  try {
    // Instagram profile URLs:
    //   https://www.instagram.com/username
    //   https://www.instagram.com/_u/username  (following.json format)
    const match = href.match(/instagram\.com\/(?:_u\/)?([A-Za-z0-9._]+)/);
    if (match && match[1]) return match[1].trim().toLowerCase();
  } catch {}
  return null;
}

function extractUsernames(data, label) {
  const usernames = new Set();

  function addUsername(val) {
    if (val && typeof val === 'string' && val.trim()) {
      usernames.add(val.trim().toLowerCase());
    }
  }

  // Normalize: unwrap known wrapper keys
  // following.json → { "relationships_following": [...] }
  // followers.json (alt) → { "relationships_followers": [...] } or []
  let items = data;
  if (!Array.isArray(items) && typeof items === 'object' && items !== null) {
    // Find the first array-valued key (relationships_following, relationships_followers, etc.)
    const arrayKey = Object.keys(items).find(k => Array.isArray(items[k]));
    if (arrayKey) {
      console.log(`[Follow Analyzer] ${label}: unwrapped key "${arrayKey}" (${items[arrayKey].length} items)`);
      items = items[arrayKey];
    }
  }

  if (!Array.isArray(items)) {
    console.warn(`[Follow Analyzer] ${label}: data is not an array after unwrapping`, items);
    return usernames;
  }

  for (const entry of items) {
    if (!entry || typeof entry !== 'object') continue;
    let found = false;

    // ── Strategy 1: string_list_data[].value (followers.json format) ──
    if (Array.isArray(entry.string_list_data)) {
      for (const e of entry.string_list_data) {
        if (!e) continue;
        if (typeof e.value === 'string' && e.value.trim()) {
          addUsername(e.value);
          found = true;
        } else if (e.href) {
          // Fallback: extract from href URL if value is missing
          const fromHref = extractUsernameFromHref(e.href);
          if (fromHref) { addUsername(fromHref); found = true; }
        }
      }
    }

    // ── Strategy 2: title field (following.json format) ──
    // Only use title if we didn't already find a username from string_list_data.value
    if (!found && typeof entry.title === 'string' && entry.title.trim()) {
      addUsername(entry.title);
      found = true;
    }

    // ── Strategy 3: username / user field (alternative formats) ──
    if (!found && typeof entry.username === 'string' && entry.username.trim()) {
      addUsername(entry.username);
      found = true;
    }
    if (!found && typeof entry.user === 'string' && entry.user.trim()) {
      addUsername(entry.user);
    }
  }

  console.log(`[Follow Analyzer] ${label}: found ${usernames.size} usernames`, [...usernames].slice(0, 10));
  return usernames;
}

function readJSON(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => {
      try { resolve(JSON.parse(e.target.result)); }
      catch { reject(new Error(`"${file.name}" is not valid JSON.`)); }
    };
    reader.onerror = () => reject(new Error(`Could not read "${file.name}".`));
    reader.readAsText(file);
  });
}

// ─── Error display ────────────────────────────────────────────────────────────
function setError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

// ─── Main analysis ────────────────────────────────────────────────────────────
async function analyze() {
  setError('');

  const fFiles  = document.getElementById('input-followers').files;
  const ingFiles = document.getElementById('input-following').files;

  if (fFiles.length === 0 || ingFiles.length === 0) {
    setError('Lütfen analiz etmeden önce her iki bölüme de dosya yükleyin.'); return;
  }

  // Validate all files are JSON
  for (const f of [...fFiles, ...ingFiles]) {
    if (!f.name.toLowerCase().endsWith('.json')) {
      setError(`"${f.name}" JSON dosyası değil. Sadece .json dosyaları yükleyin.`); return;
    }
  }

  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing…';

  try {
    // Read ALL files from both slots
    const fDataArray  = await Promise.all([...fFiles].map(f => readJSON(f)));
    const ingDataArray = await Promise.all([...ingFiles].map(f => readJSON(f)));

    console.log(`[Follow Analyzer] Loaded ${fDataArray.length} followers file(s), ${ingDataArray.length} following file(s)`);

    // Merge all usernames from all files in each slot
    const followersSet = new Set();
    for (const fData of fDataArray) {
      const partial = extractUsernames(fData, 'Followers');
      for (const u of partial) followersSet.add(u);
    }

    const followingSet = new Set();
    for (const ingData of ingDataArray) {
      const partial = extractUsernames(ingData, 'Following');
      for (const u of partial) followingSet.add(u);
    }

    console.log(`[Follow Analyzer] Total: ${followersSet.size} followers, ${followingSet.size} following`);

    if (followersSet.size === 0 && followingSet.size === 0)
      throw new Error('Hiçbir kullanıcı adı bulunamadı. Doğru Instagram JSON dışa aktarım dosyalarını yüklediğinizden emin olun.');

    notFollowingBack = [...followingSet]
      .filter(u => !followersSet.has(u))
      .sort((a, b) => a.localeCompare(b));

    currentView = [...notFollowingBack];

    document.getElementById('s-followers').textContent = followersSet.size.toLocaleString();
    document.getElementById('s-following').textContent = followingSet.size.toLocaleString();
    document.getElementById('s-ghost').textContent     = notFollowingBack.length.toLocaleString();

    document.getElementById('search-input').value = '';
    renderList(notFollowingBack);

    const card = document.getElementById('results-card');
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    setError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze';
  }
}

// ─── Render list ──────────────────────────────────────────────────────────────
function renderList(users) {
  const list = document.getElementById('user-list');

  if (users.length === 0 && notFollowingBack.length === 0) {
    list.innerHTML = `
      <li class="empty-state">
        <div class="es-icon">🎉</div>
        <div class="es-title">All clear!</div>
        <div class="es-body">Everyone you follow is following you back.</div>
      </li>`;
    return;
  }

  if (users.length === 0) {
    list.innerHTML = `
      <li class="empty-state">
        <div class="es-icon">🔍</div>
        <div class="es-title">No matches</div>
        <div class="es-body">Try a different search term.</div>
      </li>`;
    return;
  }

  list.innerHTML = users.map((username, i) => {
    const initial = username[0].toUpperCase();
    const rank    = notFollowingBack.indexOf(username) + 1;
    const href    = `https://www.instagram.com/${encodeURIComponent(username)}/`;
    return `
      <li class="user-item">
        <div class="user-left">
          <div class="avatar">${initial}</div>
          <div class="user-row">
            <div class="user-name">@${escapeHtml(username)}</div>
            <div class="user-index">#${rank} of ${notFollowingBack.length}</div>
          </div>
        </div>
        <a class="profile-link" href="${href}" target="_blank" rel="noopener noreferrer">
          View ↗
        </a>
      </li>`;
  }).join('');
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function filterList(query) {
  const q = query.trim().toLowerCase();
  currentView = q
    ? notFollowingBack.filter(u => u.includes(q))
    : [...notFollowingBack];
  renderList(currentView);
}

// ─── Copy to clipboard ────────────────────────────────────────────────────────
async function copyList() {
  if (!notFollowingBack.length) return;
  const text = currentView.map(u => '@' + u).join('\n');
  const btn  = document.getElementById('btn-copy');

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = Object.assign(document.createElement('textarea'), {
      value: text, style: 'position:fixed;opacity:0'
    });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  btn.innerHTML = '✓ Copied!';
  btn.classList.add('success');
  setTimeout(() => {
    btn.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy List`;
    btn.classList.remove('success');
  }, 2200);
}

// ─── Export CSV ───────────────────────────────────────────────────────────────
function downloadCSV() {
  if (!notFollowingBack.length) return;
  const rows  = [['#', 'username', 'profile_url']];
  notFollowingBack.forEach((u, i) =>
    rows.push([i + 1, u, `https://www.instagram.com/${u}/`])
  );
  const csv  = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: 'not-following-back.csv'
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
